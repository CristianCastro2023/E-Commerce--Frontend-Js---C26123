<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina De Contacto</title>
    <link rel="stylesheet" href="../css/styles-contacto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="../index.html" class="logo-link">
            <img src="../images/Logo/mi-LOGO2.png" alt="Logo de la Tienda" class="logo-img">
        </a>
        <nav>
            <ul>
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contenido del formulario de contacto -->
    <div class="contact-wrapper">
        <div class="contact-container">
            <h2>Contáctanos</h2>
            <p>¿Tienes alguna duda sobre nuestros productos? Escríbenos.</p>

            <form action="https://formspree.io/f/mqegjplz" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="name" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="message" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
        </div>
        <p>&copy; 2026 Castro Clothing Co.</p>
    </footer>

</body>
</html>
