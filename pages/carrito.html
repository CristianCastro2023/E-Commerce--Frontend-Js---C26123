<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="../index.html" class="logo-link">
            <img src="../images/Logo/mi-LOGO2.png" alt="Logo de la Tienda" class="logo-img">
        </a>
        <nav>
            <ul>
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="../index.html#productos">Productos</a></li>  <!-- 👈 AGREGADO -->
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <div class="cart-container">
            <a href="carrito.html" class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </header>

    <main class="cart-main">
        <h1 class="cart-title">🛒 Carrito de Compras</h1>
        
        <section id="contenedor-carrito" class="cart-products">
            <!-- Los productos del carrito se renderizan desde JS -->
        </section>

        <div id="acciones-carrito" class="cart-actions">
            <!-- Los botones se agregan desde JS -->
        </div>

        <section id="resumen-carrito" class="cart-summary">
            <!-- El resumen se agrega desde JS -->
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
        </div>
        <p>&copy; 2026 Castro Clothing Co.</p>
    </footer>

    <script type="module" src="../js/carrito.js"></script>
</body>
</html>
