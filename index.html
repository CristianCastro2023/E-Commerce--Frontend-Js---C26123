<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda E-Commerce de Indumentaria</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo-link">
            <img src="images/Logo/mi-LOGO2.png" alt="Logo de la Tienda" class="logo-img">
        </a>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="pages/contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <div class="cart-container">
            <a href="pages/carrito.html" class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </header>   
    
    <section id="home" class="hero">
        <h1>Bienvenido a Nuestra Tienda</h1>
        <p>Descubre nuestra selección exclusiva de productos de indumentaria diseñados para ti. Calidad, estilo y comodidad en cada detalle.</p>
    </section>

    <section id="productos" class="products-container">
        <h2>Nuestros Productos</h2>
        
        <div id="contenedor-tarjetas" class="products-grid">
            <!-- Los productos se generan desde JS -->
        </div>
    </section>

    <footer id="contacto">
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-twitter"></i></a> 
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
        </div>
        <p>&copy; 2026 Castro Clothing Co.</p>
    </footer>

    <script type="module" src="js/index.js"></script>
</body>
</html>
